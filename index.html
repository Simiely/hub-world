<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Hub World · 导航中心</title>
    <!-- 防止浏览器首次绘制白屏：在外部资源加载前立即设置暗色背景 -->
    <style>html{background:#08080c}html[data-theme="light"]{background:#f5f0eb}body{margin:0}</style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink: #ff9292;
            --pink-light: #ffaaaa;
            --pink-dim: rgba(255, 146, 146, 0.12);
            --pink-glow: rgba(255, 146, 146, 0.35);
            --pink-border: rgba(255, 146, 146, 0.18);
            --bg: #08080c;
            --bg-card: #08080c;
            --border: rgba(255, 255, 255, 0.08);
            --text: #eee;
            --text-muted: #888;
            --text-dim: #555;
            --font-en: 'Inter', -apple-system, sans-serif;
            --font-zh: 'Noto Sans SC', -apple-system, 'Microsoft YaHei', sans-serif;
            --nav-bg-scrolled: rgba(255, 255, 255, 0.07);
            --mask-color: #fff;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --pink: #ff9292;
            --pink-light: #ffaaaa;
            --pink-dim: rgba(255, 146, 146, 0.08);
            --pink-glow: rgba(255, 146, 146, 0.2);
            --pink-border: rgba(255, 146, 146, 0.15);
            --bg: #f2f2f2;
            --bg-card: #f5f0eb;
            --border: rgba(0, 0, 0, 0.08);
            --text: #1a1a1a;
            --text-muted: #666;
            --text-dim: #999;
            --nav-bg-scrolled: rgba(255, 255, 255, 0.85);
            --mask-color: #333;
            color-scheme: light;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
        }

        body {
            font-family: var(--font-zh);
            background: var(--bg);
            color: var(--text);
            position: relative;
        }

        /* Canvas background */
        #particleCanvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* Mouse glow */
        .mouse-glow {
            position: fixed;
            width: 520px; height: 520px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,146,146,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }
        body:hover .mouse-glow { opacity: 1; }

        /* ===== View Base ===== */

        .view-welcome {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.45s ease-out,
                        transform 0.45s ease-out;
            transform-origin: center center;
            z-index: 1;
        }
        .view-welcome.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(1.03);
        }

        .view-catalog {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.45s ease-in,
                        transform 0.45s ease-in;
            transform-origin: center center;
            transform: scale(0.97) translateY(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            z-index: 1;
        }
        .view-catalog.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            z-index: 3;
        }

        /* Footer */
        .footer-simple {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.04em;
        }
        .footer-simple span { color: var(--pink); }
        .footer-abs {
            position: absolute;
            bottom: 20px; left: 0; right: 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            z-index: 5;
        }

        /* =============================================
           VIEW 1: Welcome — Vertical 3-Section Layout
           (matching reference image)
           ============================================= */
        .welcome-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: min(92vw, 1600px);
            height: 100vh;
            padding: 10vh 40px 0 40px;
            position: relative;
            z-index: 2;
        }

        /* ---- SECTION 1: Title ---- */
        .hero-title-main {
            font-family: var(--font-en);
            font-weight: 900;
            font-size: 3.2rem;
            line-height: 1.08;
            letter-spacing: -0.04em;
            color: var(--text);
            opacity: 0;
            transform: translateY(24px);
            transition: all 0.75s 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hero-title-main.show {
            opacity: 1; transform: translateY(0);
        }
        .hero-title-main .hl-pink {
            color: var(--pink);
        }
        .hero-title-main .title-hub {
            opacity: 0.8;
        }
        .hero-title-main .title-sub {
            opacity: 0.6;
        }

        /* Subtitle under title */
        .hero-subtitle {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 18px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.55s 0.65s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hero-subtitle.show {
            opacity: 1; transform: translateY(0);
        }

        /* ---- SECTION 2: Floating Cards Area ---- */
        .section-cards {
            position: relative;
            width: 100%;
            flex: 1;
            overflow: visible;
            -webkit-mask-image: linear-gradient(
                to right,
                transparent 0%,
                var(--mask-color) 10%,
                var(--mask-color) 90%,
                transparent 100%
            );
            mask-image: linear-gradient(
                to right,
                transparent 0%,
                var(--mask-color) 10%,
                var(--mask-color) 90%,
                transparent 100%
            );
            z-index: 10;
        }

        /* ---- SECTION 3: Action Button — 15% from bottom ---- */
        .section-action {
            text-align: center;
            flex-shrink: 0;
            margin-top: auto;
            padding-bottom: 5vh;
            z-index: 15;
            position: relative;
        }

        /* (no longer need edge-fade CSS — handled by mask-image above) */

        /* Floating card — bigger */
        .floating-card {
            position: absolute;
            width: 210px;
            height: 255px;
            scale: var(--card-scale, 1);
            background: var(--bg-card);
            backdrop-filter: blur(19.2px);
            -webkit-backdrop-filter: blur(19.2px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 22px 16px;
            cursor: pointer;
            will-change: transform, filter, opacity;
            transition: box-shadow 0.3s ease,
                        border-color 0.3s ease,
                        background 0.3s ease;
            z-index: var(--card-z);
        }
        .floating-card:hover {
            border-color: rgba(255,146,146,0.28);
            background: var(--pink-dim);
            box-shadow: 0 12px 44px rgba(255,146,146,0.1),
                        0 0 64px rgba(255,146,146,0.04);
            z-index: 25;
        }
        .floating-card .fc-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
        .floating-card .fc-name {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .floating-card .fc-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.35;
        }
        /* Small badge like @coplin in ref image */
        .fc-tag-badge {
            position: absolute;
            top: -10px;
            right: -6px;
            font-size: 0.58rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 8px;
            background: var(--pink);
            color: #fff;
            opacity: 0.85;
            white-space: nowrap;
        }

        /* Gentle sway keyframes for each card */
        @keyframes gentleSway0 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.4deg)) translate(3px, -2px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1deg)) translate(-2px, 3px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.7deg)) translate(2px, 1px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway1 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) - 1.1deg)) translate(-3px, 2px); }
            50%  { transform: rotate(calc(var(--base-rot) + 0.8deg)) translate(2px, -3px); }
            75%  { transform: rotate(calc(var(--base-rot) - 0.5deg)) translate(-2px, 1px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway2 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.8deg)) translate(4px, 1px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.3deg)) translate(-3px, -2px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.9deg)) translate(2px, 3px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway3 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) - 0.7deg)) translate(-2px, 3px); }
            50%  { transform: rotate(calc(var(--base-rot) + 1.1deg)) translate(3px, -1px); }
            75%  { transform: rotate(calc(var(--base-rot) - 0.4deg)) translate(-1px, 2px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway4 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.6deg)) translate(4px, -3px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.2deg)) translate(-4px, 2px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.6deg)) translate(3px, 2px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway5 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.0deg)) translate(2px, -4px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.5deg)) translate(-3px, 1px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.5deg)) translate(1px, 3px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--bg);
            border: none;
            border-radius: 13px;
            padding: 14px 36px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            letter-spacing: -0.01em;
            box-shadow: 0 8px 32px rgba(255,146,146,0.25),
                        0 0 60px rgba(255,146,146,0.06);
            transition: box-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(20px);
            background: transparent;
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--pink), var(--pink-light));
            z-index: -1;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cta-btn.show {
            opacity: 1;
            transform: translateY(0);
        }
        .cta-btn:hover {
            box-shadow: 0 12px 48px rgba(255,146,146,0.4),
                        0 0 80px rgba(255,146,146,0.12);
        }
        .cta-btn:hover::before {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--pink-light), var(--pink));
        }
        .cta-btn:active {
            box-shadow: 0 4px 16px rgba(255,146,146,0.2),
                        0 0 40px rgba(255,146,146,0.04);
        }

        .action-hint {
            font-size: 0.76rem;
            color: var(--text-dim);
            margin-top: 12px;
            opacity: 0.5;
            letter-spacing: 0.02em;
        }

        /* =============================================
           VIEW 2: Catalog Page
           ============================================= */

        /* ---- Glass Navbar ---- */
        .catalog-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
            transition: background 0.3s ease, opacity 0.4s ease;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .catalog-nav.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .catalog-nav.scrolled {
            background: var(--nav-bg-scrolled);
            border-bottom-color: var(--pink-border);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.25s;
        }
        .nav-brand:hover { opacity: 0.8; }
        .nav-logo {
            height: 1.12rem;
            width: auto;
            vertical-align: middle;
            filter: drop-shadow(0 0 8px var(--pink-glow));
        }
        .nav-name {
            font-family: var(--font-en);
            font-weight: 900;
            font-size: 1.33rem;
            color: var(--text);
            letter-spacing: -0.03em;
        }
        .nav-tabs {
            display: flex;
            gap: 6px;
        }
        .nav-tab {
            font-family: var(--font-zh);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 7px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .nav-tab:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.05);
        }
        .nav-tab.active {
            color: #fff;
            background: rgba(255, 146, 146, 0.18);
            border-color: rgba(255, 146, 146, 0.25);
            box-shadow: 0 0 20px rgba(255, 146, 146, 0.08);
        }
        .nav-tab.active[data-cat="all"] { color: #fff; background: rgba(255,146,146,0.18); border-color: rgba(255,146,146,0.25); }
        .nav-tab.active[data-cat="web"] { color: #4ecdc4; background: rgba(78,205,196,0.12); border-color: rgba(78,205,196,0.2); }
        .nav-tab.active[data-cat="tool"] { color: #f39c12; background: rgba(243,156,18,0.12); border-color: rgba(243,156,18,0.2); }
        .nav-tab.active[data-cat="design"] { color: #9b59b6; background: rgba(155,89,182,0.12); border-color: rgba(155,89,182,0.2); }
        [data-theme="light"] .nav-tab:hover { color: #555; background: rgba(0,0,0,0.04); }
        [data-theme="light"] .nav-tab.active { color: #fff; }
        [data-theme="light"] .nav-tab.active[data-cat="all"] { background: rgba(255,146,146,0.15); }

        /* Theme toggle button */
        .theme-toggle {
            font-size: 1.1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            margin-left: 12px;
            transition: all 0.25s ease;
            line-height: 1;
        }
        .theme-toggle:hover {
            background: var(--pink-dim);
            border-color: var(--pink-border);
        }
        .welcome-theme-float {
            position: fixed;
            top: 14px;
            right: 32px;
            z-index: 60;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 10px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .view-welcome.hidden .welcome-theme-float { display: none; }

        /* ---- Grid Layout ---- */
        .catalog-masonry {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            width: 100%;
            max-width: min(92vw, 1640px);
            margin-top: 76px;
            padding: 10px 32px 40px;
        }
        @media (max-width: 1100px) { .catalog-masonry { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px)  { .catalog-masonry { grid-template-columns: repeat(2, 1fr); padding: 10px 16px 40px; } }
        @media (max-width: 520px)  { .catalog-masonry { grid-template-columns: 1fr; } }

        .cat-card {
            display: flex;
            flex-direction: column;
            height: 320px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0 0 20px 0;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(36px) scale(0.96);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        border-color 0.3s ease,
                        box-shadow 0.3s ease;
            cursor: pointer;
        }
        .cat-card.visible {
            opacity: 1; transform: translateY(0) scale(1);
        }
        /* Color bar top */
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pink), var(--pink-light));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
            z-index: 2;
        }
        .cat-card:hover::before { transform: scaleX(1); }
        /* Card cover image placeholder */
        .cat-card .cc-cover {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, rgba(255,146,146,0.08) 0%, rgba(255,146,146,0.03) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            overflow: hidden;
        }
        .cat-card .cc-body {
            padding: 16px 20px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .cat-card h3 {
            font-size: 0.96rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .cat-card p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .cat-card .cc-tags {
            display: flex; gap: 6px;
            flex-wrap: wrap;
        }
        .cat-card .cc-tag {
            font-size: 0.66rem;
            padding: 3px 9px;
            border-radius: 8px;
            background: var(--pink-dim);
            color: var(--pink);
            font-weight: 500;
        }
        .cat-card .cc-arrow {
            position: absolute;
            bottom: 20px; right: 18px;
            color: var(--pink);
            font-size: 0.95rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }
        .cat-card:hover {
            transform: translateY(-6px) scale(1.02) !important;
            border-color: rgba(255,146,146,0.25);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 16px 48px rgba(255,146,146,0.08),
                        0 0 64px rgba(255,146,146,0.04);
        }
        .cat-card:hover .cc-arrow { opacity: 1; transform: translateX(0); }
        .cat-card.empty {
            border-style: solid;
            opacity: 0.6 !important;
            pointer-events: none;
            cursor: default;
        }
        .cat-card.empty:hover {
            transform: none !important;
            box-shadow: none !important;
            border-color: var(--border) !important;
            opacity: 0.6 !important;
        }
        .cat-card.empty .cc-cover { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,146,146,0.03) 100%); }
        .cat-card.empty h3 { color: var(--text-muted); }
        .cat-card.empty p  { color: var(--text-dim); }

        /* Launch overlay */
        .launch-overlay {
            position: fixed; inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .launch-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .launch-overlay .ripple-circle {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--pink), transparent 80%);
            transform: scale(0);
            animation: rippleExpand 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes rippleExpand {
            0%   { transform: scale(0); border-radius: 50%; }
            35%  { transform: scale(15); border-radius: 8%; }
            65%  { transform: scale(28); border-radius: 2%; }
            85%  { transform: scale(38); border-radius: 0.5%; }
            100% { transform: scale(42); border-radius: 0; }
        }

        /* Responsive */
        @media (max-width: 800px) {
            .welcome-layout { padding: 10vh 18px 20px; }
            .floating-card { width: 160px; height: 195px; }
            .catalog-nav { padding: 10px 16px; }
            .nav-tab { font-size: 0.74rem; padding: 6px 12px; }
        }

<script>
// =============================================
//  CONFIG: Backup projects data (used when API fails)
// =============================================
var projects = [
    {
        name: '琅勃拉邦旅行计划',
        desc: '琅勃拉邦 5 日慢游 · 4 人双酒店定制',
        icon: '✈️',
        path: 'luang-prabang-trip',
        tags: ['旅行', '定制'],
        category: 'web',
    },
];


// =============================================
//  Activate Hero animations (vertical cascade)
// =============================================
function activateHero() {
    document.getElementById('titleMain').classList.add('show');
    document.getElementById('heroSub').classList.add('show');
    var btn = document.getElementById('btnToCatalog');
    if (btn) setTimeout(function() { btn.classList.add('show'); }, 850);
}

// =============================================
//  Live clock in action-hint
// =============================================
function updateClock() {
    var el = document.getElementById('liveClock');
    if (!el) return;
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    var wd = weekdays[now.getDay()];
    var hh = String(now.getHours()).padStart(2, '0');
    var mm = String(now.getMinutes()).padStart(2, '0');
    var ss = String(now.getSeconds()).padStart(2, '0');
    el.textContent = y + '/' + m + '/' + d + ' ' + wd + ' ' + hh + ':' + mm + ':' + ss;
}
setInterval(updateClock, 1000);
updateClock();

// =============================================
//  Floating Cards — poker-deal fan spread
//  Continuous right-to-left drift + edge fade
// =============================================
function initFloatingCards() {
    var container = document.getElementById('cardSection');
    if (!container) return;
    
    // Clear existing cards to avoid duplicates
    container.innerHTML = '';
    
    var swayKeys = ['gentleSway0','gentleSway1','gentleSway2','gentleSway3','gentleSway4','gentleSway5'];

    // Build card data — always create 6 card DOM nodes for dynamic show/hide
    var cardData = [];
    var allNames = ['即将上线', 'Coming Soon', '敬请期待', '新项目', '规划中', '更多精彩'];
    var allIcons = ['🚀', '📦', '💡', '🎨', '🔧', '🌟'];
    var i;
    for (i = 0; i < 6; i++) {
        if (i < projects.length) {
            cardData.push({
                name: projects[i].name,
                desc: projects[i].desc || '',
                icon: projects[i].icon || '📄',
                isReal: true,
                path: projects[i].path || '#',
                tags: projects[i].tags || []
            });
        } else {
            var eIdx = i;
            cardData.push({
                name: allNames[eIdx] || ('项目 ' + (eIdx + 1)),
                desc: '更多精彩内容即将上线',
                icon: allIcons[eIdx] || '📄',
                isReal: false,
                path: '',
                tags: []
            });
        }
    }

    // Position presets — spread to cover full visible area + overflow right
    // Cards are now 210px wide (~16-18% of container)
    // Fewer cards on narrow screens to avoid crowding
    var posSets = {
        3: [
            { top: '18%', leftPct: 5,  rot: -14, sway: 0, z: 3 },
            { top: '10%', leftPct: 38, rot: -4,  sway: 1, z: 5 },
            { top: '22%', leftPct: 72, rot: 10,  sway: 2, z: 4 },
        ],
        4: [
            { top: '14%', leftPct: 3,  rot: -18, sway: 0, z: 2 },
            { top: '6%',  leftPct: 27, rot: -7,  sway: 1, z: 4 },
            { top: '24%', leftPct: 51, rot: 8,   sway: 2, z: 6 },
            { top: '16%', leftPct: 75, rot: -11, sway: 3, z: 3 },
        ],
        6: [
            { top: '14%',  leftPct: 2,   rot: -20, sway: 0, z: 2 },
            { top: '2%',   leftPct: 22,  rot: -9,  sway: 1, z: 4 },
            { top: '28%',  leftPct: 40,  rot: 7,   sway: 2, z: 6 },
            { top: '12%',  leftPct: 58,  rot: 15,  sway: 3, z: 5 },
            { top: '25%',  leftPct: 76,  rot: -14, sway: 4, z: 3 },
            { top: '18%',  leftPct: 94,  rot: -5,  sway: 5, z: 4 },
        ],
    };
    var DRIFT_SPEED = 0.018;
    var cards = [];

    // Create all 6 card DOM elements (show/hide dynamically by ratio)
    var activeCount = 6;
    function applyCardLayout() {
        var cw = container.offsetWidth, ch = container.clientHeight;
        var ar = cw / ch;
        activeCount = ar < 0.6 ? 3 : (ar < 0.95 ? 4 : 6);
        var set = posSets[activeCount] || posSets[6];
        cards.forEach(function(c, idx) {
            var show = idx < activeCount;
            c.el.style.display = show ? '' : 'none';
            if (show) {
                var p = set[idx];
                c.el.style.setProperty('--base-rot', p.rot + 'deg');
                c.el.style.setProperty('--card-z', String(p.z));
                c.el.style.animation = swayKeys[p.sway % 5] + ' ' + (7 + idx * 0.8) + 's ease-in-out infinite alternate';
                c.baseTop = parseFloat(p.top);
                c.leftPct = p.leftPct;
                c.baseRot = p.rot;
                c.el.style.top = p.top;
                c.el.style.left = p.leftPct + '%';
            }
        });
    }

    // Create DOM elements (positions will be applied by applyCardLayout)
    cardData.forEach(function(p, idx) {
        var card = document.createElement('div');
        card.className = 'floating-card';
        card.setAttribute('data-index', idx);

        // Tag badge — show first project tag, or fallback label
        var fallbackLabels = ['#1', '#2', '#3', '#New', '#Hot'];
        var tagText = (p.tags && p.tags.length > 0) ? p.tags[0] : (fallbackLabels[idx] || '#' + idx);
        var tagBadge = '<span class="fc-tag-badge">' + tagText + '</span>';

        card.innerHTML =
            tagBadge +
            '<span class="fc-icon">' + p.icon + '</span>' +
            '<div class="fc-name">' + p.name + '</div>' +
            '<div class="fc-desc">' + p.desc + '</div>';

        // Click handler — navigate to project
        (function(projectData, el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                if (projectData.isReal && projectData.path) {
                    window.location.href = projectData.path + '/';
                } else {
                    // decorative card → show catalog with smooth view switch
                    showCatalog();
                }
            });
        })(p, card);

        container.appendChild(card);

        // Staggered fade-in
        card.style.opacity = '0';
        card.style.transform = 'rotate(0deg) scale(0.7) translateY(24px)';
        (function(c, d, r) {
            setTimeout(function() {
                c.style.opacity = '1';
                c.style.transform = 'rotate(' + r + 'deg)';
                c.style.transition = 'opacity 0.5s ease, transform 0.6s cubic-bezier(0.22,1,0.36,1)';
            }, 350 + d * 140);
        })(card, idx, 0);

        cards.push({
            el: card,
            leftPct: 2 + idx * 18,
            baseTop: 10 + idx * 3,
            baseRot: 0,
            idx: idx
        });
    });

    // Apply layout based on current aspect ratio, then start scale observer
    applyCardLayout();
    requestAnimationFrame(updateCardScale);
    var ro = new ResizeObserver(function() {
        applyCardLayout();
        updateCardScale();
    });
    ro.observe(container);

    // Adaptive scaling — shrink cards when container is too small
    function updateCardScale() {
        var ch = container.clientHeight;
        if (!ch) return;
        
        // Find min/max base top percentages among visible cards
        var minTop = 100, maxTop = 0;
        cards.forEach(function(c) {
            if (c.el.style.display === 'none') return;
            if (c.baseTop < minTop) minTop = c.baseTop;
            if (c.baseTop > maxTop) maxTop = c.baseTop;
        });
        
        // Scale based on space below the lowest card's top edge
        var available = ch * (1 - maxTop / 100);
        var scale = Math.max(0.12, (available / 255) * 0.63);
        
        // Vertical centering: account for scale(center-origin) + sway rotation
        var maxRotDeg = 22; // max base rotation 20° + sway margin
        var rotRad = maxRotDeg * Math.PI / 180;
        var rotHalfH = (210 * Math.sin(rotRad) + 255 * Math.cos(rotRad)) / 2;
        var halfVisual = rotHalfH * scale;
        // Visual top edge of the highest card
        var groupTopPx = minTop / 100 * ch + (127.5 - halfVisual);
        // Visual bottom edge of the lowest card
        var groupBotPx = maxTop / 100 * ch + (127.5 + halfVisual);
        
        // Ideal offset to center, clamped to prevent clipping
        var idealOff = (ch - groupBotPx + groupTopPx) / 2;
        var clampTop = -groupTopPx;
        var clampBot = ch - groupBotPx - 20;
        var offsetPx = Math.max(clampTop, Math.min(clampBot, idealOff));
        var offsetPct = offsetPx / ch * 100;
        
        // Ultra-wide compensation: widen cards on aspect ratio > 18:9
        // Ultra-tall compensation: narrow cards when ≤3 on portrait
        var containerW = container.offsetWidth;
        var aspectRatio = containerW / ch;
        var cardW = 210;
        if (aspectRatio > 2) {
            cardW = Math.min(340, 210 * (aspectRatio / 2));
        } else if (aspectRatio < 0.6 && activeCount <= 3) {
            cardW = Math.max(150, 210 * (aspectRatio / 0.6));
        }
        
        cards.forEach(function(c) {
            c.el.style.setProperty('--card-scale', String(scale));
            c.el.style.width = cardW + 'px';
            c.el.style.top = (c.baseTop + offsetPct) + '%';
        });
    }

    // === ANIMATION LOOP: Drift (edge fade handled by CSS mask-image) ===
    function animationLoop() {
        var containerW = container.offsetWidth;
        var cardWpct = (210 / containerW) * 100;

        cards.forEach(function(c) {
            // Drift LEFT
            c.leftPct -= DRIFT_SPEED;

            // OFF-SCREEN LEFT → move to far right
            if (c.leftPct + cardWpct < -3) {
                var maxPct = -999;
                cards.forEach(function(cc) {
                    if (cc.leftPct > maxPct) maxPct = cc.leftPct;
                });
                c.leftPct = maxPct + cardWpct + 1.5 + Math.random() * 0.5;
            }

            c.el.style.left = c.leftPct + '%';
        });

        requestAnimationFrame(animationLoop);
    }

    // Start after initial fade-in
    setTimeout(animationLoop, 2000);

    // MOUSE PARALLAX on floating cards
    document.addEventListener('mousemove', function(e) {
        var vh = window.innerHeight;
        // Only react when mouse is near card section
        var sectionRect = container.getBoundingClientRect();
        if (e.clientY < sectionRect.top - 60 || e.clientY > sectionRect.bottom + 60) return;

        var mx = (e.clientX / window.innerWidth - 0.5) * 2;
        var my = (e.clientY / vh - 0.5) * 2;

        cards.forEach(function(c, i) {
            var speed = 0.12 + (i % 3) * 0.06;
            c.el.style.marginLeft = (mx * speed * 10) + 'px';
            c.el.style.marginTop  = (my * speed * 6) + 'px';
        });
    });

    document.addEventListener('mouseleave', function() {
        cards.forEach(function(c) {
            c.el.style.marginLeft = '0';
            c.el.style.marginTop  = '0';
        });
    });
}

// =============================================
//  Launch overlay animation (app-icon zoom)
// =============================================
function playLaunchAnimation(targetEl, callback) {
    var overlay = document.getElementById('launchOverlay');
    overlay.classList.add('active');

    if (targetEl) {
        targetEl.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        targetEl.style.zIndex = '10000';
        targetEl.style.transform += ' scale(1.2)';
    }

    setTimeout(function() {
        if (targetEl) {
            targetEl.style.transition = 'opacity 0.15s';
            targetEl.style.opacity = '0';
        }
        if (callback) callback();
    }, 480);

    setTimeout(function() {
        overlay.classList.remove('active');
        var ripple = overlay.querySelector('.ripple-circle');
        if (ripple) ripple.style.animation = '';
        if (targetEl) {
            targetEl.style.zIndex = '';
            targetEl.style.transition = '';
            targetEl.style.transform = '';
            targetEl.style.opacity = '';
        }
    }, 700);
}

// =============================================
//  View switching
// =============================================
function showCatalog() {
    var welcome = document.getElementById('viewWelcome');
    var catalog = document.getElementById('viewCatalog');
    var nav = document.getElementById('catalogNav');
    welcome.classList.add('hidden');
    catalog.classList.add('visible');
    if (nav) nav.classList.add('visible');
    renderCatalog(currentFilter);
}

function showWelcome() {
    var welcome = document.getElementById('viewWelcome');
    var catalog = document.getElementById('viewCatalog');
    var nav = document.getElementById('catalogNav');
    catalog.classList.remove('visible');
    welcome.classList.remove('hidden');
    if (nav) nav.classList.remove('visible');
}


function getSortedProjects(filterCat) {
    var list = projects.map(function(p) {
        return {
            name: p.name,
            desc: p.desc || '',
            icon: p.icon || '📄',
            path: p.path || '',
            tags: p.tags || [],
            category: p.category || 'other'
        };
    });

    // Filter by category
    if (filterCat && filterCat !== 'all') {
        list = list.filter(function(p) { return p.category === filterCat; });
    }

    // Sort by name (pinyin)
    list.sort(function(a, b) {
        return a.name.localeCompare(b.name, 'zh-CN-u-co-pinyin');
    });
    return list;
}

// =============================================
//  Render catalog masonry grid
// =============================================
var currentFilter = 'all';

function renderCatalog(filterCat) {
    if (filterCat === undefined) filterCat = currentFilter;
    currentFilter = filterCat;

    // Update active tab
    var tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(function(t) {
        t.classList.remove('active');
        if (t.getAttribute('data-cat') === filterCat) t.classList.add('active');
    });

    var grid = document.getElementById('projectGrid');
    grid.innerHTML = '';

    var sorted = getSortedProjects(filterCat);
    var total = sorted.length;
    var needPlaceholders = Math.max(0, 6 - total);
    var emptyIcons = ['🚀', '📦', '💡', '🎨', '🔧', '📊'];
    var emptyNames = ['新项目筹备中', '更多内容即将上线', '敬请期待', '开发中...', '规划中', '即将推出'];

    // Helper: random cover gradient for variety
    var coverGradients = [
        'linear-gradient(135deg, rgba(255,146,146,0.12) 0%, rgba(180,100,220,0.06) 100%)',
        'linear-gradient(135deg, rgba(100,180,220,0.10) 0%, rgba(255,146,146,0.05) 100%)',
        'linear-gradient(135deg, rgba(220,180,100,0.10) 0%, rgba(255,146,146,0.06) 100%)',
        'linear-gradient(135deg, rgba(100,220,180,0.10) 0%, rgba(180,140,220,0.05) 100%)',
    ];

    sorted.forEach(function(p, idx) {
        var card = document.createElement('a');
        card.href = (p.path && p.path !== '') ? p.path + '/' : '#';
        card.className = 'cat-card';
        card.setAttribute('data-path', p.path || '');
        card.setAttribute('data-category', p.category || 'other');
        card.style.transitionDelay = (idx * 0.06) + 's';

        var tagsHtml = (p.tags || []).map(function(t) {
            return '<span class="cc-tag">' + t + '</span>';
        }).join('');

        var coverBg = coverGradients[idx % coverGradients.length];

        card.innerHTML =
            '<div class="cc-cover" style="background:' + coverBg + '">' +
                '<span style="font-size:2.4rem;">' + (p.icon || '📄') + '</span>' +
            '</div>' +
            '<div class="cc-body">' +
                '<h3>' + p.name + '</h3>' +
                '<p>' + (p.desc || '') + '</p>' +
                (tagsHtml ? '<div class="cc-tags">' + tagsHtml + '</div>' : '') +
            '</div>' +
            '<div class="cc-arrow">→</div>';

        card.addEventListener('click', function(e) {
            if (p.path && p.path !== '') {
            }
        });

        grid.appendChild(card);

        (function(el, d) {
            setTimeout(function() { el.classList.add('visible'); }, 50 + d * 60);
        })(card, idx);
    });

    for (var i = 0; i < needPlaceholders; i++) {
        (function(eIdx) {
            var emptyCard = document.createElement('div');
            emptyCard.className = 'cat-card empty';
            emptyCard.style.transitionDelay = (total + eIdx) * 0.06 + 's';
            emptyCard.innerHTML =
                '<div class="cc-cover" style="background:rgba(255,255,255,0.02)">' +
                    '<span style="font-size:2rem;">' + (emptyIcons[eIdx] || '📄') + '</span>' +
                '</div>' +
                '<div class="cc-body">' +
                    '<h3>' + (emptyNames[eIdx] || '待上线') + '</h3>' +
                    '<p>更多精彩内容即将上线</p>' +
                '</div>';
            grid.appendChild(emptyCard);

            setTimeout(function() { emptyCard.classList.add('visible'); }, 50 + (total + eIdx) * 60);
        })(i);
    }
}

// =============================================
//  Particle canvas background
// =============================================
function initParticles() {
    var canvas = document.getElementById('particleCanvas');
    var ctx = canvas.getContext('2d');
    var w, h, particleArr, mouse = { x: -1000, y: -1000 };

    function resize() {
        var oldW = w, oldH = h;
        var newW = window.innerWidth;
        var newH = window.innerHeight;

        // 如果尺寸没变，跳过（避免不必要的 canvas 清空）
        if (oldW === newW && oldH === newH) return;

        // 保存当前画布快照，防止设置 canvas.width/height 时清空导致的闪白
        var snapshot = null;
        try {
            if (oldW && oldH) {
                snapshot = ctx.getImageData(0, 0, oldW, oldH);
            }
        } catch(e) {}

        w = canvas.width  = newW;
        h = canvas.height = newH;

        // 立即恢复快照（缩放适配新尺寸），消除清空间隙
        if (snapshot) {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = oldW;
            tempCanvas.height = oldH;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(snapshot, 0, 0);
            ctx.drawImage(tempCanvas, 0, 0, oldW, oldH, 0, 0, newW, newH);
        }

        // Remap existing particles to new canvas bounds
        if (oldW && oldH && particleArr && particleArr.length) {
            var scaleX = newW / oldW;
            var scaleY = newH / oldH;
            particleArr.forEach(function(p) {
                p.x *= scaleX;
                p.y *= scaleY;
            });
        }
    }

    function createParticles() {
        // Density: ~1 particle per 6,000 px²  (~120 at 1920×1080)
        var area = w * h;
        var count = Math.max(60, Math.min(350, Math.round(area / 6000)));
        particleArr = [];
        for (var j = 0; j < count; j++) {
            particleArr.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.5 + 0.5,
                dx: (Math.random() - 0.5) * 0.25,
                dy: (Math.random() - 0.5) * 0.25,
                alpha: Math.random() * 0.5 + 0.1,
                cooldown: 0
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        
        // 1) Mouse attraction
        particleArr.forEach(function(p) {
            var dist = Math.sqrt(Math.pow(p.x - mouse.x, 2) + Math.pow(p.y - mouse.y, 2));
            if (dist < 180) {
                p.x += (mouse.x - p.x) * 0.005;
                p.y += (mouse.y - p.y) * 0.005;
            }
        });

        // 2) Cluster detection — when enough particles crowd a tiny area, burst explode
        var BURST_RADIUS = 22;
        var BURST_MIN = 3;
        var exploded = {};
        particleArr.forEach(function(p, pi) {
            if (exploded[pi]) return;
            var near = [];
            for (var k = 0; k < particleArr.length; k++) {
                if (k === pi) continue;
                var d = Math.sqrt(Math.pow(p.x - particleArr[k].x, 2) + Math.pow(p.y - particleArr[k].y, 2));
                if (d < BURST_RADIUS) near.push(k);
            }
            if (near.length >= BURST_MIN - 1) {
                var all = [pi].concat(near);
                var canBurst = false;
                all.forEach(function(idx) { if (particleArr[idx].cooldown <= 0) canBurst = true; });
                if (canBurst) {
                    var cx = 0, cy = 0;
                    all.forEach(function(idx) {
                        cx += particleArr[idx].x;
                        cy += particleArr[idx].y;
                    });
                    cx /= all.length;
                    cy /= all.length;
                    all.forEach(function(idx) {
                        exploded[idx] = true;
                        var cp = particleArr[idx];
                        cp.cooldown = 120;
                        var angle = Math.atan2(cp.y - cy, cp.x - cx);
                        var strength = 3 + Math.random() * 3;
                        cp.dx += Math.cos(angle) * strength * 0.12;
                        cp.dy += Math.sin(angle) * strength * 0.12;
                    });
                }
            }
        });

        // 3) Random jitter — prevent particles from settling at equilibrium
        particleArr.forEach(function(p) {
            p.dx += (Math.random() - 0.5) * 0.025;
            p.dy += (Math.random() - 0.5) * 0.025;
            // Clamp drift speed so it doesn't go wild
            var spd = Math.sqrt(p.dx * p.dx + p.dy * p.dy);
            if (spd > 0.5) {
                p.dx = (p.dx / spd) * 0.5;
                p.dy = (p.dy / spd) * 0.5;
            }
        });

        // 4) Movement, cooldown & draw
        particleArr.forEach(function(p) {
            // Decrease explosion cooldown
            if (p.cooldown > 0) p.cooldown--;
            
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 146, 146, ' + p.alpha + ')';
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();

    var resizeTimer = null;
    window.addEventListener('resize', function() {
        resize();
        // Debounce: after resize stops, adjust particle count for new area
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            var area = w * h;
            var target = Math.max(60, Math.min(350, Math.round(area / 6000)));
            var current = particleArr.length;
            if (target > current) {
                // Add particles
                for (var j = current; j < target; j++) {
                    particleArr.push({
                        x: Math.random() * w,
                        y: Math.random() * h,
                        r: Math.random() * 1.5 + 0.5,
                        dx: (Math.random() - 0.5) * 0.25,
                        dy: (Math.random() - 0.5) * 0.25,
                        alpha: Math.random() * 0.5 + 0.1,
                        cooldown: 0
                    });
                }
            } else if (target < current) {
                // Remove excess particles
                particleArr.length = target;
            }
        }, 300);
    });
    document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.addEventListener('mouseleave', function() { mouse.x = -1000; mouse.y = -1000; });
}

// =============================================
//  Theme toggle (dark/light)
// =============================================
(function() {
    var html = document.documentElement;
    var navBtn = document.getElementById('themeToggle');
    var welcomeBtn = document.getElementById('welcomeThemeToggle');
    var saved = localStorage.getItem('hubworld-theme');
    
    // Default to dark if no preference saved
    var theme = saved || 'dark';
    html.setAttribute('data-theme', theme);
    var icon = theme === 'dark' ? '🌙' : '☀️';
    if (navBtn) navBtn.textContent = icon;
    if (welcomeBtn) welcomeBtn.textContent = icon;
    document.querySelector('meta[name="color-scheme"]').content = theme;
    
    function toggleTheme() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        var icon = next === 'dark' ? '🌙' : '☀️';
        if (navBtn) navBtn.textContent = icon;
        if (welcomeBtn) welcomeBtn.textContent = icon;
        document.querySelector('meta[name="color-scheme"]').content = next;
        localStorage.setItem('hubworld-theme', next);
    }
    
    if (navBtn) navBtn.addEventListener('click', toggleTheme);
    if (welcomeBtn) welcomeBtn.addEventListener('click', toggleTheme);
})();

// =============================================
//  Catalog Nav: tabs + brand click + scroll
// =============================================
function initCatalogNav() {
    var nav = document.getElementById('catalogNav');

    // Nav brand click → go back to welcome
    document.getElementById('navBrand').addEventListener('click', function() {
        showWelcome();
    });

    // Tab switching
    document.getElementById('navTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.nav-tab');
        if (!tab) return;
        var cat = tab.getAttribute('data-cat');
        if (cat && cat !== currentFilter) {
            renderCatalog(cat);
        }
    });

    // Scroll effect on nav
    var viewCatalog = document.getElementById('viewCatalog');
    viewCatalog.addEventListener('scroll', function() {
        if (viewCatalog.scrollTop > 10) {
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    }, { passive: true });
}
