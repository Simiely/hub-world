<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>世界的风吹向你 / 探索</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <!-- 防止浏览器在外部资源加载前立即设置暗色背景 -->
    <style>html{background:#08080c}html[data-theme="light"]{background:#f5f0eb}body{margin:0}</style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== Reset ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink: #ff9292;
            --pink-light: #ffaaaa;
            --pink-dim: rgba(255, 146, 146, 0.12);
            --pink-glow: rgba(255, 146, 146, 0.35);
            --pink-border: rgba(255, 146, 146, 0.18);
            --bg: #08080c;
            --bg-card: #08080c;
            --border: rgba(255, 255, 255, 0.08);
            --text: #eee;
            --text-muted: #888;
            --text-dim: #555;
            --font-en: 'Inter', -apple-system, sans-serif;
            --font-zh: 'Noto Sans SC', -apple-system, 'Microsoft YaHei', sans-serif;
            --nav-bg-scrolled: rgba(255, 255, 255, 0.07);
            --mask-color: #fff;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --pink: #ff9292;
            --pink-light: #ffaaaa;
            --pink-dim: rgba(255, 146, 146, 0.08);
            --pink-glow: rgba(255, 146, 146, 0.2);
            --pink-border: rgba(255, 146, 146, 0.15);
            --bg: #f2f2f2;
            --bg-card: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --text: #1a1a1a;
            --text-muted: #666;
            --text-dim: #999;
            --nav-bg-scrolled: rgba(255, 255, 255, 0.85);
            --mask-color: #333;
            color-scheme: light;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font-zh);
            color: var(--text);
        }
        body {
            position: relative;
        }

        /* Canvas background */
        #particleCanvas {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* Mouse glow */
        .mouse-glow {
            position: fixed;
            width: 520px; height: 520px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,146,146,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }
        body:hover .mouse-glow { opacity: 1; }

        /* ===== View Base ===== */

        .view-welcome {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.45s ease-out,
                        transform 0.45s ease-out;
            transform-origin: center center;
            z-index: 1;
        }
        .view-welcome.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(1.03);
        }

        .view-catalog {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.45s ease-in,
                        transform 0.45s ease-in;
            transform-origin: center center;
            transform: scale(0.97) translateY(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            z-index: 1;
        }
        .view-catalog.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            z-index: 3;
        }

        /* Footer */
        .footer-base {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.04em;
        }
        .footer-base span { color: var(--pink); }
        .footer-abs {
            position: absolute;
            bottom: 20px; left: 0; right: 0;
            z-index: 5;
        }
        .footer-simple {} /* kept for backward compat */

        /* =============================================
           VIEW 1: Welcome — Vertical 3-Section Layout
           (matching reference image)
           ============================================= */
        .welcome-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: min(92vw, 1600px);
            height: 100vh;
            padding: 10vh 40px 0 40px;
            position: relative;
            z-index: 2;
        }

        /* ---- SECTION 1: Title ---- */
        .hero-title-main {
            font-family: var(--font-en);
            font-weight: 900;
            font-size: 3.2rem;
            line-height: 1.08;
            letter-spacing: -0.04em;
            color: var(--text);
            opacity: 0;
            transform: translateY(24px);
            transition: all 0.75s 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hero-title-main.show {
            opacity: 1; transform: translateY(0);
        }
        .hero-title-main .hl-pink {
            color: var(--pink);
        }
        .hero-title-main .title-hub {
            opacity: 0.8;
        }
        .hero-title-main .title-sub {
            opacity: 0.6;
        }

        /* Subtitle under title */
        .hero-subtitle {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 18px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.55s 0.65s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hero-subtitle.show {
            opacity: 1; transform: translateY(0);
        }

        /* ---- SECTION 2: Floating Cards Area ---- */
        .section-cards {
            position: relative;
            width: 100%;
            flex: 1;
            overflow: visible;
            -webkit-mask-image: linear-gradient(
                to right,
                transparent 0%,
                var(--mask-color) 10%,
                var(--mask-color) 90%,
                transparent 100%
            );
            mask-image: linear-gradient(
                to right,
                transparent 0%,
                var(--mask-color) 10%,
                var(--mask-color) 90%,
                transparent 100%
            );
            z-index: 10;
        }

        /* ---- SECTION 3: Action Button — 15% from bottom ---- */
        .section-action {
            text-align: center;
            flex-shrink: 0;
            margin-top: auto;
            padding-bottom: 5vh;
            z-index: 15;
            position: relative;
        }

        /* (no longer need edge-fade CSS — handled by mask-image above) */

        /* Floating card — bigger */
        .floating-card {
            position: absolute;
            width: 210px;
            height: 255px;
            scale: var(--card-scale, 1);
            background: rgba(8, 8, 12, 0.1);
            backdrop-filter: blur(19.2px);
            -webkit-backdrop-filter: blur(19.2px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 22px 16px;
            cursor: pointer;
            will-change: transform, filter, opacity;
            transition: box-shadow 0.3s ease,
                        border-color 0.3s ease,
                        background 0.3s ease,
                        opacity 0.3s ease;
            z-index: var(--card-z);
        }
        .floating-card:hover {
            border-color: rgba(255,146,146,0.28);
            background: rgba(8, 8, 12, 0.75);
            box-shadow: 0 12px 44px rgba(255,146,146,0.1),
                        0 0 64px rgba(255,146,146,0.04);
            z-index: 25;
        }
        [data-theme="light"] .floating-card { background: rgba(242, 242, 242, 0.1); }
        [data-theme="light"] .floating-card:hover { background: rgba(242, 242, 242, 0.85); }
        .floating-card .fc-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
        .floating-card .fc-name {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .floating-card .fc-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.35;
        }
        /* Small badge like @coplin in ref image */
        .fc-tag-badge {
            position: absolute;
            top: -10px;
            right: -6px;
            font-size: 0.58rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 8px;
            background: var(--pink);
            color: #fff;
            opacity: 0.85;
            white-space: nowrap;
        }

        /* Gentle sway keyframes for each card */
        @keyframes gentleSway0 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.4deg)) translate(3px, -2px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1deg)) translate(-2px, 3px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.7deg)) translate(2px, 1px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway1 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) - 1.1deg)) translate(-3px, 2px); }
            50%  { transform: rotate(calc(var(--base-rot) + 0.8deg)) translate(2px, -3px); }
            75%  { transform: rotate(calc(var(--base-rot) - 0.5deg)) translate(-2px, 1px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway2 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.8deg)) translate(4px, 1px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.3deg)) translate(-3px, -2px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.9deg)) translate(2px, 3px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway3 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) - 0.7deg)) translate(-2px, 3px); }
            50%  { transform: rotate(calc(var(--base-rot) + 1.1deg)) translate(3px, -1px); }
            75%  { transform: rotate(calc(var(--base-rot) - 0.4deg)) translate(-1px, 2px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway4 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.6deg)) translate(4px, -3px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.2deg)) translate(-4px, 2px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.6deg)) translate(3px, 2px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }
        @keyframes gentleSway5 {
            0%   { transform: rotate(var(--base-rot)) translate(0, 0); }
            25%  { transform: rotate(calc(var(--base-rot) + 1.0deg)) translate(2px, -4px); }
            50%  { transform: rotate(calc(var(--base-rot) - 1.5deg)) translate(-3px, 1px); }
            75%  { transform: rotate(calc(var(--base-rot) + 0.5deg)) translate(1px, 3px); }
            100% { transform: rotate(var(--base-rot)) translate(0, 0); }
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 11px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--bg);
            border: none;
            border-radius: 13px;
            padding: 14px 36px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            letter-spacing: -0.01em;
            box-shadow: 0 8px 32px rgba(255,146,146,0.25),
                        0 0 60px rgba(255,146,146,0.06);
            transition: box-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(20px);
            background: transparent;
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--pink), var(--pink-light));
            z-index: -1;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cta-btn.show {
            opacity: 1;
            transform: translateY(0);
        }
        .cta-btn:hover {
            box-shadow: 0 12px 48px rgba(255,146,146,0.4),
                        0 0 80px rgba(255,146,146,0.12);
        }
        .cta-btn:hover::before {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--pink-light), var(--pink));
        }
        .cta-btn:active {
            box-shadow: 0 4px 16px rgba(255,146,146,0.2),
                        0 0 40px rgba(255,146,146,0.04);
        }

        .action-hint {
            font-size: 0.76rem;
            color: var(--text-dim);
            margin-top: 12px;
            opacity: 0;
            letter-spacing: 0.02em;
            transition: all 0.5s 0s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .action-hint.show {
            opacity: 0.5;
        }

        /* =============================================
           VIEW 2: Catalog Page
           ============================================= */

        /* ---- Glass Navbar ---- */
        .catalog-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
            transition: opacity 0.4s ease;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .catalog-nav.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .catalog-nav.scrolled {
            background: var(--nav-bg-scrolled);
            border-bottom-color: var(--pink-border);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.25s;
        }
        .nav-brand:hover { opacity: 0.8; }

        /* ---- Welcome top: brand + toggle by coordinates ---- */
        .welcome-brand {
            position: fixed;
            top: 19px;
            left: 32px;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .welcome-brand:hover { opacity: 0.8; }
        .welcome-toggle {
            position: fixed;
            top: 16px;
            right: 32px;
            z-index: 60;
        }
        .view-welcome.hidden .welcome-brand,
        .view-welcome.hidden .welcome-toggle { display: none; }

        /* ---- Grid Layout ---- */
        .nav-logo {
            height: 1.12rem;
            width: auto;
            vertical-align: middle;
            filter: drop-shadow(0 0 8px var(--pink-glow));
        }
        .nav-name {
            font-family: var(--font-en);
            font-weight: 650;
            font-size: 1.33rem;
            color: var(--text);
            letter-spacing: -0.03em;
        }
        .nav-tabs {
            display: flex;
            gap: 6px;
        }
        .nav-tab {
            font-family: var(--font-zh);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 7px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .nav-tab:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.05);
        }
        .nav-tab.active {
            color: #fff;
            background: rgba(255, 146, 146, 0.18);
            border-color: rgba(255, 146, 146, 0.25);
            box-shadow: 0 0 20px rgba(255, 146, 146, 0.08);
        }
        .nav-tab.active[data-cat="web"] { color: #4ecdc4; background: rgba(78,205,196,0.12); border-color: rgba(78,205,196,0.2); }
        .nav-tab.active[data-cat="tool"] { color: #f39c12; background: rgba(243,156,18,0.12); border-color: rgba(243,156,18,0.2); }
        .nav-tab.active[data-cat="design"] { color: #9b59b6; background: rgba(155,89,182,0.12); border-color: rgba(155,89,182,0.2); }
        [data-theme="light"] .nav-tab:hover { color: #555; background: rgba(0,0,0,0.04); }
        [data-theme="light"] .nav-tab.active { color: var(--pink); }

        /* Theme toggle button */
        .theme-toggle {
            font-size: 1.1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            margin-left: 12px;
            transition: all 0.25s ease;
            line-height: 1;
        }
        .theme-toggle:hover {
            background: var(--pink-dim);
            border-color: var(--pink-border);
        }

        /* ---- Grid Layout ---- */
        .catalog-masonry {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            width: 100%;
            max-width: min(92vw, 1640px);
            margin-top: 76px;
            padding: 10px 32px 40px;
        }
        @media (max-width: 1100px) { .catalog-masonry { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px)  { .catalog-masonry { grid-template-columns: repeat(2, 1fr); padding: 10px 16px 40px; } }
        @media (max-width: 520px)  { .catalog-masonry { grid-template-columns: 1fr; } }

        .cat-card {
            display: flex;
            flex-direction: column;
            height: 320px;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0 0 20px 0;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(36px) scale(0.96);
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                        border-color 0.3s ease,
                        box-shadow 0.3s ease;
            cursor: pointer;
        }
        .cat-card.visible {
            opacity: 1; transform: translateY(0) scale(1);
        }
        /* Color bar top */
        .cat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--pink), var(--pink-light));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
            z-index: 2;
        }
        .cat-card:hover::before { transform: scaleX(1); }
        /* Card cover image placeholder */
        .cat-card .cc-cover {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, rgba(255,146,146,0.08) 0%, rgba(255,146,146,0.03) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            overflow: hidden;
        }
        .cat-card .cc-body {
            padding: 16px 20px 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }
        .cat-card h3 {
            font-size: 0.96rem;
            font-weight: 700;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .cat-card p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .cat-card .cc-tags {
            display: flex; gap: 6px;
            flex-wrap: wrap;
        }
        .cat-card .cc-tag {
            font-size: 0.66rem;
            padding: 3px 9px;
            border-radius: 8px;
            background: var(--pink-dim);
            color: var(--pink);
            font-weight: 500;
        }
        .cat-card .cc-arrow {
            position: absolute;
            bottom: 20px; right: 18px;
            color: var(--pink);
            font-size: 0.95rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }
        .cat-card:hover {
            transform: translateY(-6px) scale(1.02) !important;
            border-color: rgba(255,146,146,0.25);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 16px 48px rgba(255,146,146,0.08),
                        0 0 64px rgba(255,146,146,0.04);
        }
        .cat-card:hover .cc-arrow { opacity: 1; transform: translateX(0); }
        .cat-card.empty {
            border-style: solid;
            opacity: 0.6 !important;
            pointer-events: none;
            cursor: default;
        }
        .cat-card.empty:hover {
            transform: none !important;
            box-shadow: none !important;
            border-color: var(--border) !important;
            opacity: 0.6 !important;
        }
        .cat-card.empty .cc-cover { background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,146,146,0.03) 100%); }
        .cat-card.empty h3 { color: var(--text-muted); }
        .cat-card.empty p  { color: var(--text-dim); }

        /* Launch overlay */
        .launch-overlay {
            position: fixed; inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        .launch-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .launch-overlay .ripple-circle {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--pink), transparent 80%);
            transform: scale(0);
            animation: rippleExpand 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes rippleExpand {
            0%   { transform: scale(0); border-radius: 50%; }
            35%  { transform: scale(15); border-radius: 8%; }
            65%  { transform: scale(28); border-radius: 2%; }
            85%  { transform: scale(38); border-radius: 0.5%; }
            100% { transform: scale(42); border-radius: 0; }
        }

        /* Responsive */
        @media (max-width: 800px) {
            .welcome-layout { padding: 10vh 18px 20px; }
            .floating-card { width: 160px; height: 195px; }
            .catalog-nav { padding: 10px 16px; }
            .nav-tab { font-size: 0.74rem; padding: 6px 12px; }
            .welcome-brand { left: 16px; top: 10px; }
            .welcome-toggle { right: 16px; top: 10px; }
        }
    </style>
</head>
<body>

<script>
// =============================================
//  DOM helper: shorthand for getElementById
// =============================================
var $ = function(id) { return document.getElementById(id); };

// =============================================
//  Project data — loaded from projects.json
// =============================================
var projects = [];
var FALLBACK_PROJECTS = [
    { name: '琅勃拉邦旅行计划', desc: '琅勃拉邦 5 日慢游 · 4 人双酒店定制', icon: '✈️', path: 'luang-prabang-trip', tags: ['旅行', '定制'], category: 'web' }
];

// =============================================
//  Normalize a project object (fill defaults)
// =============================================
function normalizeProject(p) {
    return {
        name: p.name,
        desc: p.desc || '',
        icon: p.icon || '📄',
        path: p.path || '',
        tags: p.tags || [],
        category: p.category || 'other',
        isReal: true,
    };
}

// =============================================
//  Activate Hero animations (vertical cascade)
// =============================================
function activateHero() {
    $('titleMain').classList.add('show');
    $('heroSub').classList.add('show');
    var btn = $('btnToCatalog');
    if (btn) setTimeout(function() { btn.classList.add('show'); }, 850);
    var clock = $('liveClock');
    if (clock) setTimeout(function() { clock.classList.add('show'); }, 650);
}

// =============================================
//  Live clock in action-hint
// =============================================
function updateClock() {
    var el = $('liveClock');
    if (!el) return;
    var now = new Date();
    var pad = function(n) { return String(n).padStart(2, '0'); };
    var weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    el.textContent = now.getFullYear() + '/' + pad(now.getMonth() + 1) + '/' + pad(now.getDate())
        + ' ' + weekdays[now.getDay()]
        + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

// =============================================
//  Floating Cards — poker-deal fan spread
//  Continuous right-to-left drift + edge fade
// =============================================
function initFloatingCards() {
    var container = $('cardSection');
    if (!container) return;
    container.innerHTML = '';
    
    var swayKeys = ['gentleSway0','gentleSway1','gentleSway2','gentleSway3','gentleSway4','gentleSway5'];

    // Build card data — randomly pick up to 6 from projects
    var PLACEHOLDER_NAMES = ['即将上线', 'Coming Soon', '敬请期待', '新项目', '规划中', '更多精彩'];
    var PLACEHOLDER_ICONS = ['🚀', '📦', '💡', '🎨', '🔧', '🌟'];
    var cardData = [];

    // Fisher-Yates shuffle, pick up to 6
    var shuffled = projects.slice();
    for (var si = shuffled.length - 1; si > 0; si--) {
        var sj = Math.floor(Math.random() * (si + 1));
        var tmp = shuffled[si];
        shuffled[si] = shuffled[sj];
        shuffled[sj] = tmp;
    }
    var pickCount = Math.min(6, shuffled.length);
    for (var i = 0; i < 6; i++) {
        if (i < pickCount) {
            cardData.push(normalizeProject(shuffled[i]));
        } else {
            cardData.push({
                name: PLACEHOLDER_NAMES[i] || ('项目 ' + (i + 1)),
                desc: '更多精彩内容即将上线',
                icon: PLACEHOLDER_ICONS[i] || '📄',
                isReal: false, path: '', tags: [], category: 'other'
            });
        }
    }

    // ======================================
    //  New: single-row layout + fly-in entrance + slow drift
    // ======================================
    var CARD_W = 210;
    var CARD_H = 255;
    var MIN_GAP = 26;
    var MAX_GAP = 80;
    var STAGGER_MS = 130;
    var FLY_MS = 480;
    var DRIFT_SPEED = 0.012;
    var cards = [];
    var state = 'entering';  // 'entering' | 'drifting'
    var entranceStart = 0;
    var driftOffset = 0;
    var enteredCount = 0;

    function calcLayout() {
        var cw = container.offsetWidth;
        var gap = Math.max(MIN_GAP, Math.min(MAX_GAP, (cw - CARD_W * 6) / 5));
        cards.forEach(function(c, i) {
            c.targetX = i * (CARD_W + gap);
        });
        return gap;
    }

    var swayAnimNames = ['gentleSway0','gentleSway1','gentleSway2','gentleSway3','gentleSway4','gentleSway5'];

    // Create card DOM elements
    cardData.forEach(function(p, idx) {
        var card = document.createElement('div');
        card.className = 'floating-card';
        card.setAttribute('data-index', idx);

        var fallbackLabels = ['#1', '#2', '#3', '#New', '#Hot'];
        var tagText = (p.tags && p.tags.length > 0) ? p.tags[0] : (fallbackLabels[idx] || '#' + idx);
        var tagBadge = '<span class="fc-tag-badge">' + tagText + '</span>';

        card.innerHTML =
            tagBadge +
            '<span class="fc-icon">' + p.icon + '</span>' +
            '<div class="fc-name">' + p.name + '</div>' +
            '<div class="fc-desc">' + p.desc + '</div>';

        (function(projectData, el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                if (projectData.isReal && projectData.path) {
                    window.open(projectData.path + '/', '_blank');
                } else {
                    showCatalog();
                }
            });
        })(p, card);

        container.appendChild(card);

        // Start off-screen right
        card.style.left = (container.offsetWidth + CARD_W + 30) + 'px';
        card.style.top = '42%';
        card.style.opacity = '0';
        card.style.transform = 'rotate(0deg) scale(1)';
        card.style.transition = 'none';
        card.style.setProperty('--card-scale', '1');

        cards.push({
            el: card,
            data: p,
            targetX: 0,
            entered: false,
            idx: idx
        });
    });

    // Calculate layout and start entrance
    calcLayout();
    entranceStart = performance.now();

    // Adaptive scale — shrink/scale cards based on container height
    function updateCardScale() {
        var ch = container.clientHeight;
        if (!ch) return;
        var scale = Math.max(0.2, Math.min(1, ch / 420));
        var cardW = Math.max(150, Math.min(340, CARD_W * Math.min(1.5, Math.max(0.7, scale))));
        cards.forEach(function(c) {
            c.el.style.setProperty('--card-scale', String(scale * 0.92));
            c.el.style.width = cardW + 'px';
        });
    }

    var ro = new ResizeObserver(function() {
        calcLayout();
        updateCardScale();
        // Re-position entered cards during drift phase
        if (state === 'drifting') {
            cards.forEach(function(c) {
                if (c.entered) {
                    var cw = container.offsetWidth;
                    c.targetX = c.idx * (CARD_W + Math.max(MIN_GAP, Math.min(MAX_GAP, (cw - CARD_W * 6) / 5)));
                }
            });
        }
    });
    ro.observe(container);
    requestAnimationFrame(updateCardScale);

    // ===== ANIMATION LOOP =====
    var totalSpan = 0;
    function animationLoop(ts) {
        if (!entranceStart) return;

        var cw = container.offsetWidth;
        var gap = Math.max(MIN_GAP, Math.min(MAX_GAP, (cw - CARD_W * 6) / 5));
        totalSpan = 6 * CARD_W + 5 * gap;

        if (state === 'entering') {
            var allEntered = true;

            for (var i = 0; i < cards.length; i++) {
                var c = cards[i];
                if (c.entered) continue;
                allEntered = false;

                var localT = ts - entranceStart - i * STAGGER_MS;
                if (localT <= 0) continue;

                var t = Math.min(1, localT / FLY_MS);
                // Ease-out cubic bezier: fast start, gentle stop
                var eased = 1 - Math.pow(1 - t, 3.2);

                var fromX = cw + CARD_W + 30;
                c.el.style.left = (fromX + (c.targetX - fromX) * eased) + 'px';
                c.el.style.opacity = String(Math.min(1, eased * 1.8));
                c.el.style.zIndex = String(10 + i);

                if (t >= 1) {
                    c.entered = true;
                    enteredCount++;
                    c.el.style.left = c.targetX + 'px';
                    c.el.style.opacity = '1';
                    // Activate gentle sway rotation
                    var sIdx = i % swayAnimNames.length;
                    c.el.style.animation = swayAnimNames[sIdx] + ' ' + (7 + i * 0.7) + 's ease-in-out infinite alternate';
                    c.el.style.setProperty('--base-rot', '0deg');
                }
            }

            if (allEntered && enteredCount >= 6) {
                state = 'drifting';
            }
        }

        if (state === 'drifting') {
            driftOffset -= DRIFT_SPEED * 60 * (1/60);

            cards.forEach(function(c) {
                var x = c.targetX + driftOffset;

                // Wrap: moved fully off-screen left → re-insert to the right
                if (x + CARD_W < 0) {
                    // Find the rightmost card edge and place this card after it
                    var maxEdge = -99999;
                    cards.forEach(function(cc) {
                        var xe = cc.targetX + driftOffset;
                        if (xe + CARD_W > maxEdge) maxEdge = xe + CARD_W;
                    });
                    x = maxEdge + gap;
                }

                c.el.style.left = x + 'px';
            });
        }

        requestAnimationFrame(animationLoop);
    }

    requestAnimationFrame(animationLoop);

    // ===== MOUSE PARALLAX =====
    document.addEventListener('pointermove', function(e) { try {
        var vh = window.innerHeight;
        var sectionRect = container.getBoundingClientRect();
        if (e.clientY < sectionRect.top - 60 || e.clientY > sectionRect.bottom + 60) return;

        var mx = (e.clientX / window.innerWidth - 0.5) * 2;
        var my = (e.clientY / vh - 0.5) * 2;

        cards.forEach(function(c, i) {
            var speed = 0.12 + (i % 3) * 0.06;
            c.el.style.marginLeft = (mx * speed * 10) + 'px';
            c.el.style.marginTop  = (my * speed * 6) + 'px';
        });
    } catch(e) {} });

    document.addEventListener('pointerleave', function() { try {
        cards.forEach(function(c) {
            c.el.style.marginLeft = '0';
            c.el.style.marginTop  = '0';
        });
    } catch(e) {} });


    // MOUSE PARALLAX on floating cards
    document.addEventListener('pointermove', function(e) { try {
        var vh = window.innerHeight;
        // Only react when mouse is near card section
        var sectionRect = container.getBoundingClientRect();
        if (e.clientY < sectionRect.top - 60 || e.clientY > sectionRect.bottom + 60) return;

        var mx = (e.clientX / window.innerWidth - 0.5) * 2;
        var my = (e.clientY / vh - 0.5) * 2;

        cards.forEach(function(c, i) {
            var speed = 0.12 + (i % 3) * 0.06;
            c.el.style.marginLeft = (mx * speed * 10) + 'px';
            c.el.style.marginTop  = (my * speed * 6) + 'px';
        });
    } catch(e) {} });

    document.addEventListener('pointerleave', function() { try {
        cards.forEach(function(c) {
            c.el.style.marginLeft = '0';
            c.el.style.marginTop  = '0';
        });
    } catch(e) {} });
}

// =============================================
//  Launch overlay animation (app-icon zoom)
// =============================================
function playLaunchAnimation(targetEl, callback) {
    var overlay = document.getElementById('launchOverlay');
    overlay.classList.add('active');

    if (targetEl) {
        targetEl.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        targetEl.style.zIndex = '10000';
        targetEl.style.transform += ' scale(1.2)';
    }

    setTimeout(function() {
        if (targetEl) {
            targetEl.style.transition = 'opacity 0.15s';
            targetEl.style.opacity = '0';
        }
        if (callback) callback();
    }, 480);

    setTimeout(function() {
        overlay.classList.remove('active');
        var ripple = overlay.querySelector('.ripple-circle');
        if (ripple) ripple.style.animation = '';
        if (targetEl) {
            targetEl.style.zIndex = '';
            targetEl.style.transition = '';
            targetEl.style.transform = '';
            targetEl.style.opacity = '';
        }
    }, 700);
}

// =============================================
//  View switching
// =============================================
function showCatalog() {
    $('viewWelcome').classList.add('hidden');
    $('viewCatalog').classList.add('visible');
    var nav = $('catalogNav');
    if (nav) nav.classList.add('visible');
    renderCatalog(currentFilter);
}

function showWelcome() {
    $('viewWelcome').classList.remove('hidden');
    $('viewCatalog').classList.remove('visible');
    var nav = $('catalogNav');
    if (nav) nav.classList.remove('visible');
}


function getSortedProjects(filterCat) {
    var list = projects.map(normalizeProject);
    // Filter by category
    if (filterCat && filterCat !== 'all') {
        list = list.filter(function(p) { return p.category === filterCat; });
    }

    // Sort by name (pinyin)
    list.sort(function(a, b) {
        return a.name.localeCompare(b.name, 'zh-CN-u-co-pinyin');
    });
    return list;
}

// =============================================
//  Render catalog masonry grid
// =============================================
var currentFilter = 'all';

function renderCatalog(filterCat) {
    if (filterCat === undefined) filterCat = currentFilter;
    currentFilter = filterCat;

    // Update active tab
    var tabs = document.querySelectorAll('.nav-tab');
    tabs.forEach(function(t) {
        t.classList.remove('active');
        if (t.getAttribute('data-cat') === filterCat) t.classList.add('active');
    });

    var grid = $('projectGrid');
    grid.innerHTML = '';

    var sorted = getSortedProjects(filterCat);
    var total = sorted.length;
    var needPlaceholders = Math.max(0, 6 - total);
    var emptyIcons = ['🚀', '📦', '💡', '🎨', '🔧', '📊'];
    var emptyNames = ['新项目筹备中', '更多内容即将上线', '敬请期待', '开发中...', '规划中', '即将推出'];

    // Helper: random cover gradient for variety
    var coverGradients = [
        'linear-gradient(135deg, rgba(255,146,146,0.12) 0%, rgba(180,100,220,0.06) 100%)',
        'linear-gradient(135deg, rgba(100,180,220,0.10) 0%, rgba(255,146,146,0.05) 100%)',
        'linear-gradient(135deg, rgba(220,180,100,0.10) 0%, rgba(255,146,146,0.06) 100%)',
        'linear-gradient(135deg, rgba(100,220,180,0.10) 0%, rgba(180,140,220,0.05) 100%)',
    ];

    sorted.forEach(function(p, idx) {
        var card = document.createElement('a');
                card.href = (p.path && p.path !== '') ? p.path + '/' : '#';
        card.target = '_blank';
        card.rel = 'noopener';
        card.className = 'cat-card';
        card.setAttribute('data-path', p.path || '');
        card.setAttribute('data-category', p.category || 'other');
        card.style.transitionDelay = (idx * 0.06) + 's';

        var tagsHtml = (p.tags || []).map(function(t) {
            return '<span class="cc-tag">' + t + '</span>';
        }).join('');

        var coverBg = coverGradients[idx % coverGradients.length];

        card.innerHTML =
            '<div class="cc-cover" style="background:' + coverBg + '">' +
                '<span style="font-size:2.4rem;">' + (p.icon || '📄') + '</span>' +
            '</div>' +
            '<div class="cc-body">' +
                '<h3>' + p.name + '</h3>' +
                '<p>' + (p.desc || '') + '</p>' +
                (tagsHtml ? '<div class="cc-tags">' + tagsHtml + '</div>' : '') +
            '</div>' +
            '<div class="cc-arrow">→</div>';

        grid.appendChild(card);
        // Fade-in via inline style (bypasses CSS class specificity issues)
        card.style.opacity = '0';
        setTimeout(function() {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0) scale(1)';
        }, 50 + idx * 60);
    });

    for (var i = 0; i < needPlaceholders; i++) {
        (function(eIdx) {
            var emptyCard = document.createElement('div');
            emptyCard.className = 'cat-card empty';
            emptyCard.style.transitionDelay = (total + eIdx) * 0.06 + 's';
            emptyCard.innerHTML =
                '<div class="cc-cover" style="background:rgba(255,255,255,0.02)">' +
                    '<span style="font-size:2rem;">' + (emptyIcons[eIdx] || '📄') + '</span>' +
                '</div>' +
                '<div class="cc-body">' +
                    '<h3>' + (emptyNames[eIdx] || '待上线') + '</h3>' +
                    '<p>更多精彩内容即将上线</p>' +
                '</div>';
            grid.appendChild(emptyCard);
            emptyCard.style.opacity = '0';
            setTimeout(function() {
                emptyCard.style.opacity = '0.6';
                emptyCard.style.transform = 'translateY(0) scale(1)';
            }, 50 + (total + eIdx) * 60);
        })(i);
    }
}

// =============================================
//  Particle canvas background
// =============================================
function initParticles() {
    var canvas = $('particleCanvas');
    var ctx = canvas.getContext('2d');
    var w, h, particleArr, mouse = { x: -1000, y: -1000 };

    function resize() {
        var oldW = w, oldH = h;
        var newW = window.innerWidth;
        var newH = window.innerHeight;

        // 如果尺寸没变，跳过（避免不必要的 canvas 清空）
        if (oldW === newW && oldH === newH) return;

        // 保存当前画布快照，防止设置 canvas.width/height 时清空导致的闪白
        var snapshot = null;
        try {
            if (oldW && oldH) {
                snapshot = ctx.getImageData(0, 0, oldW, oldH);
            }
        } catch(e) {}

        w = canvas.width  = newW;
        h = canvas.height = newH;

        // 立即恢复快照（缩放适配新尺寸），消除清空间隙
        if (snapshot) {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = oldW;
            tempCanvas.height = oldH;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.putImageData(snapshot, 0, 0);
            ctx.drawImage(tempCanvas, 0, 0, oldW, oldH, 0, 0, newW, newH);
        }

        // Remap existing particles to new canvas bounds
        if (oldW && oldH && particleArr && particleArr.length) {
            var scaleX = newW / oldW;
            var scaleY = newH / oldH;
            particleArr.forEach(function(p) {
                p.x *= scaleX;
                p.y *= scaleY;
            });
        }
    }

    function createParticle() {
        return {
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.5 + 0.5,
            dx: (Math.random() - 0.5) * 0.25,
            dy: (Math.random() - 0.5) * 0.25,
            alpha: Math.random() * 0.5 + 0.1,
            cooldown: 0
        };
    }
    function createParticles() {
        var area = w * h;
        var count = Math.max(60, Math.min(350, Math.round(area / 6000)));
        particleArr = [];
        for (var j = 0; j < count; j++) particleArr.push(createParticle());
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        
        // 1) Mouse attraction
        particleArr.forEach(function(p) {
            var dist = Math.sqrt(Math.pow(p.x - mouse.x, 2) + Math.pow(p.y - mouse.y, 2));
            if (dist < 180) {
                p.x += (mouse.x - p.x) * 0.005;
                p.y += (mouse.y - p.y) * 0.005;
            }
        });

        // 2) Cluster detection — when enough particles crowd a tiny area, burst explode
        var BURST_RADIUS = 22;
        var BURST_MIN = 3;
        var exploded = {};
        particleArr.forEach(function(p, pi) {
            if (exploded[pi]) return;
            var near = [];
            for (var k = 0; k < particleArr.length; k++) {
                if (k === pi) continue;
                var d = Math.sqrt(Math.pow(p.x - particleArr[k].x, 2) + Math.pow(p.y - particleArr[k].y, 2));
                if (d < BURST_RADIUS) near.push(k);
            }
            if (near.length >= BURST_MIN - 1) {
                var all = [pi].concat(near);
                var canBurst = false;
                all.forEach(function(idx) { if (particleArr[idx].cooldown <= 0) canBurst = true; });
                if (canBurst) {
                    var cx = 0, cy = 0;
                    all.forEach(function(idx) {
                        cx += particleArr[idx].x;
                        cy += particleArr[idx].y;
                    });
                    cx /= all.length;
                    cy /= all.length;
                    all.forEach(function(idx) {
                        exploded[idx] = true;
                        var cp = particleArr[idx];
                        cp.cooldown = 120;
                        var angle = Math.atan2(cp.y - cy, cp.x - cx);
                        var strength = 3 + Math.random() * 3;
                        cp.dx += Math.cos(angle) * strength * 0.12;
                        cp.dy += Math.sin(angle) * strength * 0.12;
                    });
                }
            }
        });

        // 3) Random jitter — prevent particles from settling at equilibrium
        particleArr.forEach(function(p) {
            p.dx += (Math.random() - 0.5) * 0.025;
            p.dy += (Math.random() - 0.5) * 0.025;
            // Clamp drift speed so it doesn't go wild
            var spd = Math.sqrt(p.dx * p.dx + p.dy * p.dy);
            if (spd > 0.5) {
                p.dx = (p.dx / spd) * 0.5;
                p.dy = (p.dy / spd) * 0.5;
            }
        });

        // 4) Movement, cooldown & draw
        particleArr.forEach(function(p) {
            // Decrease explosion cooldown
            if (p.cooldown > 0) p.cooldown--;
            
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 146, 146, ' + p.alpha + ')';
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();

    var resizeTimer = null;
    window.addEventListener('resize', function() {
        resize();
        // Debounce: after resize stops, adjust particle count for new area
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            var area = w * h;
            var target = Math.max(60, Math.min(350, Math.round(area / 6000)));
            var current = particleArr.length;
            if (target > current) {
                for (var j = current; j < target; j++) particleArr.push(createParticle());
            } else if (target < current) {
                // Remove excess particles
                particleArr.length = target;
            }
        }, 300);
    });
    document.addEventListener('pointermove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
    document.addEventListener('pointerleave', function() { mouse.x = -1000; mouse.y = -1000; });
}

//  Mouse glow follower

function initMouseGlow() {
    var glow = $('mouseGlow');
    document.addEventListener('pointermove', function(e) {
        glow.style.left = e.clientX + 'px';
        glow.style.top  = e.clientY + 'px';
    });
}

//  Init
// =============================================
window.addEventListener('DOMContentLoaded', function() {
    // Load project data from external JSON
    fetch('projects.json')
        .then(function(r) { return r.json(); })
        .then(function(data) { projects = data.projects || data; })
        .catch(function() { projects = FALLBACK_PROJECTS; })
        .then(function() {
            initMouseGlow();
            initParticles();
            initFloatingCards();
            initCatalogNav();
            setTimeout(activateHero, 200);
            $('btnToCatalog').addEventListener('click', function() { showCatalog(); });
        });
});

// =============================================
//  Theme toggle (dark/light)
// =============================================
(function() {
    var html = document.documentElement;
    var navBtn = $('themeToggle');
    var welcomeBtn = $('welcomeThemeToggle');
    var saved = localStorage.getItem('hubworld-theme');
    
    // Default to dark if no preference saved
    var theme = saved || 'dark';
    html.setAttribute('data-theme', theme);
    var icon = theme === 'dark' ? '🌙' : '☀️';
    if (navBtn) navBtn.textContent = icon;
    if (welcomeBtn) welcomeBtn.textContent = icon;
    document.querySelector('meta[name="color-scheme"]').content = theme;
    
    function toggleTheme() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        var icon = next === 'dark' ? '🌙' : '☀️';
        if (navBtn) navBtn.textContent = icon;
        if (welcomeBtn) welcomeBtn.textContent = icon;
        document.querySelector('meta[name="color-scheme"]').content = next;
        localStorage.setItem('hubworld-theme', next);
    }
    
    if (navBtn) navBtn.addEventListener('click', toggleTheme);
    if (welcomeBtn) welcomeBtn.addEventListener('click', toggleTheme);
})();

// =============================================
//  Catalog Nav: tabs + brand click + scroll
// =============================================
function initCatalogNav() {
    var nav = $('catalogNav');

    // Nav brand click → go back to welcome
    $('navBrand').addEventListener('click', function() {
        showWelcome();
    });

    // Welcome brand click → go to catalog
    var wBrand = $('welcomeBrand');
    if (wBrand) wBrand.addEventListener('click', function() { showCatalog(); });

    // Tab switching
    $('navTabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.nav-tab');
        if (!tab) return;
        var cat = tab.getAttribute('data-cat');
        if (cat && cat !== currentFilter) {
            renderCatalog(cat);
        }
    });

    // Scroll effect on nav
    var viewCatalog = $('viewCatalog');
    viewCatalog.addEventListener('scroll', function() {
        if (viewCatalog.scrollTop > 10) {
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
        }
    }, { passive: true });
}
